<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>タスク管理Webアプリ</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    /* 基本モバイルファースト設計 */
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      line-height: 1.6;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: 80px; /* 下部タブバーと被らないように余白を確保 */
    }

    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
    }

    /* 各セクション（カード）の基本スタイル */
    .card {
      background: white;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.04);
      border: 1px solid rgba(241, 245, 249, 0.8);
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      margin: 0 0 8px;
      letter-spacing: -0.5px;
    }

    h2 {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 16px;
    }

    h3 {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 12px;
      line-height: 1.4;
    }

    /* フォーム要素 */
    input, select, button {
      width: 100%;
      box-sizing: border-box;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1.5px solid #e2e8f0;
      font-size: 16px;
      background: #f8fafc;
      color: #0f172a;
      font-family: inherit;
      transition: all 0.2s ease;
      -webkit-appearance: none;
      appearance: none;
    }

    select {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
      background-repeat: no-repeat;
      background-position: right 16px center;
      background-size: 16px;
      padding-right: 40px;
    }

    /* 見積もり時間入力 */
    .input-with-unit {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-with-unit input {
      padding-right: 45px;
    }

    .input-with-unit .unit {
      position: absolute;
      right: 16px;
      font-size: 15px;
      font-weight: 600;
      color: #64748b;
      pointer-events: none;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #2563eb;
      background: white;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      padding-left: 4px;
    }

    /* ボタン */
    button {
      cursor: pointer;
      font-weight: 700;
      background: #f1f5f9;
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    button:active {
      transform: scale(0.98);
    }

    .primary {
      background: #2563eb;
      color: white;
      padding: 16px;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }
    .primary:hover, .primary:active {
      background: #1d4ed8;
    }

    .dark {
      background: #0f172a;
      color: white;
    }

    .green {
      background: #10b981;
      color: white;
    }

    .danger {
      color: #ef4444;
      background: #fef2f2;
      border: 1px solid #fee2e2;
    }

    /* グリッドシステム */
    .grid {
      display: grid;
      gap: 12px;
    }

    .grid2 {
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .grid4 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    /* サマリー */
    .summary {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .summary div {
      background: white;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.02);
      border: 1px solid rgba(241, 245, 249, 0.8);
    }

    .summary p {
      margin: 0;
      color: #64748b;
      font-size: 12px;
      font-weight: 600;
    }

    .summary strong {
      display: block;
      font-size: 24px;
      font-weight: 800;
      margin-top: 6px;
      color: #0f172a;
    }

    /* タスクカード */
    .task {
      border-left: 6px solid #2563eb;
      position: relative;
    }

    .task.done {
      opacity: 0.6;
      border-left-color: #94a3b8;
    }

    .badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .badge {
      background: #f1f5f9;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      color: #475569;
    }

    .info {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px 8px;
      color: #475569;
      font-size: 13px;
      background: #f8fafc;
      padding: 12px;
      border-radius: 16px;
      margin-bottom: 12px;
    }

    .info p {
      margin: 0;
    }

    .info strong {
      color: #0f172a;
    }

    .ifthen-display {
      background: #eff6ff;
      padding: 14px;
      border-radius: 16px;
      font-size: 13px;
      border: 1px dashed #bfdbfe;
      margin-top: 12px;
    }

    .ifthen-display p {
      margin: 4px 0 0;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 16px;
    }

    .actions button {
      padding: 12px 8px;
      font-size: 14px;
      border-radius: 12px;
    }

    .form-item {
      margin-bottom: 4px;
    }

    .ifthen-input-container {
      background: #eff6ff;
      padding: 16px;
      border-radius: 20px;
      border: 1px solid #dbeafe;
      margin-top: 12px;
    }

    /* タブ切り替え＆ボトムナビゲーション */
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(226, 232, 240, 0.8);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      z-index: 1000;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      padding: 4px 0;
      width: 100%;
      height: 100%;
      color: #64748b;
      font-size: 11px;
      font-weight: 700;
      transition: color 0.15s ease;
      cursor: pointer;
    }

    .nav-item:active {
      transform: none;
    }

    .nav-item .icon {
      font-size: 20px;
      margin-bottom: 2px;
      transition: transform 0.15s ease;
    }

    .nav-item.active {
      color: #2563eb;
    }

    .nav-item.active .icon {
      transform: scale(1.15);
    }

    @media (max-width: 360px) {
      .actions {
        grid-template-columns: 1fr;
      }
      .grid4 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main>
    <section id="tab-home" class="tab-content active">
      <div class="card" style="text-align: center; background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%); border: none;">
        <p style="color:#2563eb; font-weight:800; font-size: 12px; text-transform: uppercase; margin: 0 0 4px 0; letter-spacing: 1px;">卒業制作 試作版</p>
        <h1>タスク管理Webアプリ</h1>
        <p style="margin: 0; font-size: 13px; color: #475569;">
          見積もり時間と実績の誤差を確認し、時間管理の精度を上げましょう。
        </p>
      </div>

      <div class="summary">
        <div><p>総タスク</p><strong id="totalCount">0</strong></div>
        <div><p>着手率</p><strong id="startRate">0%</strong></div>
        <div><p>完了率</p><strong id="completeRate">0%</strong></div>
        <div><p>平均誤差</p><strong id="averageError">-</strong></div>
      </div>

      <div class="card">
        <h2>📊 データ管理</h2>
        <div class="grid" style="gap: 12px;">
          <button onclick="exportCsv()" class="dark" style="padding: 16px;">📂 ログデータをCSV出力</button>
          <div class="grid grid2" style="margin-top: 4px;">
            <button onclick="clearDone()" style="font-size: 13px;">完了済を一括削除</button>
            <button class="danger" onclick="clearAll()" style="font-size: 13px;">全データ削除</button>
          </div>
        </div>
      </div>
    </section>

    <section id="tab-add" class="tab-content">
      <div class="card">
        <h2>✍️ 新しいタスクを追加</h2>

        <div class="grid">
          <div class="form-item">
            <label>タスク名</label>
            <input id="titleInput" placeholder="例：卒論の背景を書く" />
          </div>

          <div class="grid grid2 form-item">
            <div>
              <label>期限</label>
              <input id="dueInput" type="date" />
            </div>

            <div>
              <label>見積もり時間</label>
              <div class="input-with-unit">
                <input id="estimateInput" type="number" min="1" pattern="[0-9]*" inputmode="numeric" placeholder="例：30" />
                <span class="unit">分</span>
              </div>
            </div>
          </div>

          <div class="grid grid2 form-item">
            <div>
              <label>カテゴリ</label>
              <select id="categoryInput">
                <option>課題</option>
                <option>自習</option>
                <option>アルバイト</option>
                <option>トレーニング</option>
                <option>その他</option>
              </select>
            </div>

            <div>
              <label>優先度</label>
              <select id="priorityInput">
                <option>高</option>
                <option selected>中</option>
                <option>低</option>
              </select>
            </div>
          </div>

          <div class="form-item">
            <label>タグ・メモ</label>
            <input id="tagsInput" placeholder="例：レポート, 重要 (カンマ区切り)" />
          </div>

          <div class="ifthen-input-container form-item">
            <strong style="display: block; margin-bottom: 10px; color: #1e40af; font-size: 14px;">If-Thenプラン（行動の習慣化）</strong>
            <div class="grid grid2">
              <div>
                <label style="color: #1e40af;">If（もし〜なら）</label>
                <input id="ifInput" placeholder="例：授業が終わったら" style="background: white;" />
              </div>
              <div>
                <label style="color: #1e40af;">Then（そのとき〜する）</label>
                <input id="thenInput" placeholder="例：図書館で30分進める" style="background: white;" />
              </div>
            </div>
          </div>

          <button class="primary" onclick="addTask()">タスクを追加する</button>
        </div>
      </div>
    </section>

    <section id="tab-list" class="tab-content">
      <div class="card" style="background: #f1f5f9; padding: 16px;">
        <div class="grid" style="gap: 12px;">
          <input id="searchInput" placeholder="🔍 検索：タイトル・タグ・If-Then" oninput="render()" style="background: white;" />

          <div class="grid4">
            <select id="sortInput" onchange="render()" style="background-color: white;">
              <option value="due">📅 期限順</option>
              <option value="new">🆕 新しい順</option>
              <option value="old">⏳ 古い順</option>
              <option value="priority">🔥 優先度順</option>
            </select>

            <select id="categoryFilter" onchange="render()" style="background-color: white;">
              <option value="all">📁 すべてカテゴリ</option>
              <option>課題</option>
              <option>自習</option>
              <option>アルバイト</option>
              <option>トレーニング</option>
              <option>その他</option>
            </select>

            <button onclick="toggleDone()" id="doneToggleBtn" style="background-color: white; font-size: 13px; padding: 10px;">未完了のみ</button>
            <span style="display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: #64748b;">タスク数: <span id="currentListCount" style="margin-left: 4px; color:#2563eb;">0</span></span>
          </div>
        </div>
      </div>

      <div id="taskList"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('home')" id="nav-home">
      <span class="icon">🏠</span>
      <span>ホーム</span>
    </button>
    <button class="nav-item" onclick="switchTab('add')" id="nav-add">
      <span class="icon">➕</span>
      <span>タスク追加</span>
    </button>
    <button class="nav-item" onclick="switchTab('list')" id="nav-list">
      <span class="icon">🔍</span>
      <span>タスク一覧</span>
    </button>
  </nav>

  <script>
    const STORAGE_KEY = 'graduation_task_app_html_v1';
    let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let showDone = false;

    // タブ切り替え制御
    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(el => {
        el.classList.remove('active');
      });
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.remove('active');
      });

      document.getElementById(`tab-${tabName}`).classList.add('active');
      document.getElementById(`nav-${tabName}`).classList.add('active');

      window.scrollTo({ top: 0, behavior: 'instant' });

      if (tabName === 'list') {
        render();
      }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function uid() {
      return Date.now().toString() + Math.random().toString(16).slice(2);
    }

    function formatMinutes(min) {
      if (!min) return '未記録';
      const h = Math.floor(min / 60);
      const m = min % 60;
      if (h === 0) return `${m}分`;
      if (m === 0) return `${h}時間`;
      return `${h}時間${m}分`;
    }

    function formatJST(timestamp) {
      if (!timestamp) return '未記録';
      return new Intl.DateTimeFormat('ja-JP', {
        timeZone: 'Asia/Tokyo',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      }).format(new Date(timestamp));
    }

    function getActualMinutes(task) {
      if (!task.startedAt || !task.completedAt) return undefined;
      return Math.max(1, Math.round((task.completedAt - task.startedAt) / 60000));
    }

    // タスク追加
    function addTask() {
      const title = document.getElementById('titleInput').value.trim();
      if (!title) {
        alert('タスク名を入力してください。');
        return;
      }

      const tagsText = document.getElementById('tagsInput').value;
      const rawEstimate = document.getElementById('estimateInput').value;

      const task = {
        id: uid(),
        title,
        done: false,
        createdAt: Date.now(),
        due: document.getElementById('dueInput').value || '',
        category: document.getElementById('categoryInput').value,
        priority: document.getElementById('priorityInput').value,
        tags: tagsText.split(',').map(t => t.trim()).filter(Boolean),
        estimateMin: rawEstimate ? Number(rawEstimate) : undefined,
        ifCondition: document.getElementById('ifInput').value.trim(),
        thenAction: document.getElementById('thenInput').value.trim()
      };

      tasks.unshift(task);
      save();
      clearForm();
      
      switchTab('list');
    }

    function clearForm() {
      document.getElementById('titleInput').value = '';
      document.getElementById('dueInput').value = '';
      document.getElementById('categoryInput').value = '課題';
      document.getElementById('priorityInput').value = '中';
      document.getElementById('tagsInput').value = '';
      document.getElementById('estimateInput').value = '';
      document.getElementById('ifInput').value = '';
      document.getElementById('thenInput').value = '';
    }

    function startTask(id) {
      tasks = tasks.map(task => {
        if (task.id === id && !task.startedAt) {
          return { ...task, startedAt: Date.now() };
        }
        return task;
      });

      save();
      render();
    }

    function completeTask(id) {
      const now = Date.now();

      tasks = tasks.map(task => {
        if (task.id === id) {
          return {
            ...task,
            done: true,
            startedAt: task.startedAt || now,
            completedAt: now
          };
        }
        return task;
      });

      save();
      render();
    }

    function reopenTask(id) {
      tasks = tasks.map(task => {
        if (task.id === id) {
          return {
            ...task,
            done: false,
            completedAt: undefined
          };
        }
        return task;
      });

      save();
      render();
    }

    function removeTask(id) {
      if (!confirm('このタスクを削除しますか？')) return;
      tasks = tasks.filter(task => task.id !== id);
      save();
      render();
    }

    function toggleDone() {
      showDone = !showDone;
      document.getElementById('doneToggleBtn').textContent =
        showDone ? '🟢 全て表示中' : '🔵 未完了表示中';
      render();
    }

    function clearDone() {
      if (!confirm('完了済みタスクを一括削除しますか？')) return;
      tasks = tasks.filter(task => !task.done);
      save();
      renderSummary();
      render();
    }

    function clearAll() {
      if (!confirm('全データを削除しますか？\n(注意: ローカルストレージ内のこのアプリの全データが失われます)')) return;
      tasks = [];
      save();
      renderSummary();
      render();
    }

    function priorityScore(priority) {
      if (priority === '高') return 3;
      if (priority === '中') return 2;
      return 1;
    }

    function getFilteredTasks() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      const category = document.getElementById('categoryFilter').value;
      const sort = document.getElementById('sortInput').value;

      let list = [...tasks];

      if (query) {
        list = list.filter(task => {
          const text = [
            task.title,
            task.category,
            task.priority,
            task.ifCondition || '',
            task.thenAction || '',
            ...(task.tags || [])
          ].join(' ').toLowerCase();

          return text.includes(query);
        });
      }

      if (category !== 'all') {
        list = list.filter(task => task.category === category);
      }

      if (!showDone) {
        list = list.filter(task => !task.done);
      }

      if (sort === 'due') {
        list.sort((a, b) => (a.due || '9999-12-31').localeCompare(b.due || '9999-12-31'));
      }

      if (sort === 'new') {
        list.sort((a, b) => b.createdAt - a.createdAt);
      }

      if (sort === 'old') {
        list.sort((a, b) => a.createdAt - b.createdAt);
      }

      if (sort === 'priority') {
        list.sort((a, b) => priorityScore(b.priority) - priorityScore(a.priority));
      }

      return list;
    }

    function renderSummary() {
      const total = tasks.length;
      const started = tasks.filter(task => task.startedAt).length;
      const done = tasks.filter(task => task.done).length;

      const startRate = total === 0 ? 0 : Math.round((started / total) * 100);
      const completeRate = total === 0 ? 0 : Math.round((done / total) * 100);

      const errorTargets = tasks.filter(task => task.estimateMin && getActualMinutes(task));

      let averageError = '-';

      if (errorTargets.length > 0) {
        const sum = errorTargets.reduce((total, task) => {
          const actualMin = getActualMinutes(task);
          return total + Math.abs(actualMin - task.estimateMin);
        }, 0);

        averageError = Math.round(sum / errorTargets.length) + '分';
      }

      document.getElementById('totalCount').textContent = total;
      document.getElementById('startRate').textContent = startRate + '%';
      document.getElementById('completeRate').textContent = completeRate + '%';
      document.getElementById('averageError').textContent = averageError;
    }

    function render() {
      renderSummary();

      const taskList = document.getElementById('taskList');
      const list = getFilteredTasks();

      document.getElementById('currentListCount').textContent = list.length;

      if (list.length === 0) {
        taskList.innerHTML = '<div class="card" style="text-align: center; color: #64748b; font-size: 14px; padding: 32px 16px;">該当するタスクがありません。</div>';
        return;
      }

      taskList.innerHTML = list.map(task => {
        const actualMin = getActualMinutes(task);
        const estimateError =
          task.estimateMin && actualMin !== undefined
            ? actualMin - task.estimateMin
            : undefined;

        return `
          <article class="card task ${task.done ? 'done' : ''}">
            <div class="badges">
              <span class="badge" style="background: #eff6ff; color: #2563eb;">${task.category}</span>
              <span class="badge" style="background: ${task.priority === '高' ? '#fef2f2; color: #ef4444;' : '#f8fafc; color: #475569;'}">優先度：${task.priority}</span>
              ${task.done ? '<span class="badge" style="background: #d1fae5; color: #065f46;">✅ 完了</span>' : ''}
            </div>

            <h3>${escapeHtml(task.title)}</h3>

            <div class="info">
              <p>期限: <strong>${task.due || 'なし'}</strong></p>
              <p>見積: <strong>${formatMinutes(task.estimateMin)}</strong></p>
              <p>着手: <strong>${task.startedAt ? formatJST(task.startedAt) : '未記録'}</strong></p>
              <p>完了: <strong>${task.completedAt ? formatJST(task.completedAt) : '未記録'}</strong></p>
              <p>実績: <strong>${formatMinutes(actualMin)}</strong></p>
              <p>誤差: <strong style="color: ${estimateError > 0 ? '#ef4444' : estimateError < 0 ? '#2563eb' : '#0f172a'}">${
                estimateError === undefined
                  ? '未計算'
                  : `${estimateError > 0 ? '+' : ''}${estimateError}分`
              }</strong></p>
            </div>

            ${
              task.ifCondition || task.thenAction
                ? `
                  <div class="ifthen-display">
                    <strong style="display: block; font-size: 12px; color: #1e40af;">💡 If-Thenプラン</strong>
                    <p><strong>If:</strong> ${escapeHtml(task.ifCondition || '未設定')}</p>
                    <p><strong>Then:</strong> ${escapeHtml(task.thenAction || '未設定')}</p>
                  </div>
                `
                : ''
            }

            ${
              task.tags && task.tags.length > 0
                ? `<div style="margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap;">${task.tags.map(tag => `<span style="font-size: 12px; color: #64748b; background: #f1f5f9; padding: 2px 8px; border-radius: 6px;">#${escapeHtml(tag)}</span>`).join('')}</div>`
                : ''
            }

            <div class="actions">
              <button class="dark" onclick="startTask('${task.id}')">⏱️ 着手</button>

              ${
                task.done
                  ? `<button onclick="reopenTask('${task.id}')">↩️ 戻す</button>`
                  : `<button class="green" onclick="completeTask('${task.id}')">✅ 完了</button>`
              }

              <button class="danger" onclick="removeTask('${task.id}')">🗑️ 削除</button>
            </div>
          </article>
        `;
      }).join('');
    }

    function buildCsvData() {
      return tasks.map(task => {
        const actualMin = getActualMinutes(task);
        const estimateError =
          task.estimateMin && actualMin !== undefined
            ? actualMin - task.estimateMin
            : undefined;

        return {
          タスク名: task.title,
          見積もり時間_分: task.estimateMin || '',
          実際の作業時間_分: actualMin || '',
          見積もりとの差_分: estimateError ?? '',
          絶対誤差_分: estimateError === undefined ? '' : Math.abs(estimateError),
          作成日時_日本時間: formatJST(task.createdAt),
          着手日時_日本時間: formatJST(task.startedAt),
          完了日時_日本時間: formatJST(task.completedAt)
        };
      });
    }

    function exportCsv() {
      if (tasks.length === 0) {
        alert('出力するログがありません。');
        return;
      }

      const headers = [
        'タスク名',
        '見積もり時間_分',
        '実際の作業時間_分',
        '見積もりとの差_分',
        '絶対誤差_分',
        '作成日時_日本時間',
        '着手日時_日本時間',
        '完了日時_日本時間'
      ];

      const rows = buildCsvData();

      const csvRows = [
        headers.join(','),
        ...rows.map(row =>
          headers.map(header => {
            const value = row[header] ?? '';
            return `"${String(value).replace(/"/g, '""')}"`;
          }).join(',')
        )
      ];

      const csvText = '\uFEFF' + csvRows.join('\r\n');
      const blob = new Blob([csvText], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);

      const link = document.createElement('a');
      link.href = url;
      link.download = 'task-log.csv';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      URL.revokeObjectURL(url);
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    // 🆕 Service Worker（sw.js）の登録処理
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker 登録成功:', reg))
          .catch(err => console.error('Service Worker 登録失敗:', err));
      });
    }

    renderSummary();
  </script>
</body>
</html>
