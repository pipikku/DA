<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My筋トレナビ</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #ec4899; /* 上半身（A）のメイン色 */
            --secondary-color: #3b82f6; /* 下半身（B）のメイン色 */
            --success-color: #10b981;
            --border-color: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 16px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .group-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
            color: white;
            font-size: 1.1rem;
            background-color: var(--primary-color);
        }

        .workout-list {
            list-style: none;
            margin-bottom: 24px;
        }

        .workout-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: var(--bg-color);
            border-radius: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        /* 完了時のスタイル */
        .workout-item.completed {
            border-color: var(--success-color);
            opacity: 0.4;
        }

        .workout-info {
            display: flex;
            flex-direction: column;
            padding-right: 8px;
            flex: 1;
        }

        .workout-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .workout-target {
            font-size: 0.9rem;
            color: #555;
            line-height: 1.3;
        }

        /* チェックマークのアイコン */
        .status-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .completed .status-icon {
            background-color: var(--success-color);
            border-color: var(--success-color);
            color: white;
        }

        .completed .status-icon::after {
            content: "✓";
        }

        .action-btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background-color: var(--text-color);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .action-btn:active {
            background-color: #000;
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker Registered'));
        }
    </script>
</head>
<body>

<div class="container">
    <header>
        <h1>今日のトレーニング</h1>
        <div id="groupBadge" class="group-badge">Aグループ</div>
    </header>

    <ul id="workoutList" class="workout-list">
        </ul>

    <button id="finishBtn" class="action-btn">今日のトレーニングを終了</button>
</div>

<script>
    // 1. アップデートされたトレーニングメニュー
    const menus = {
        A: [
            { name: "チェストプレス", target: "40kg × 12回 / 3セット" },
            { name: "ラットプルダウン", target: "40kg × 12回 / 3セット" },
            { name: "ショルダープレス", target: "25kg × 12回 / 3セット" },
            { name: "ディップス", target: "自重 × 8～10回 / 3セット" },
            { name: "バイセップスカール", target: "25kg × 12回 / 3セット" },
            { name: "アブベンチ", target: "自重 × 15～20回 / 3セット" },
            { name: "有酸素（トレッドミル/バイク）", target: "歩行6km/h・軽いジョグ8km/h（目安20分）" }
        ],
        B: [
            { name: "レッグプレス", target: "100kg × 12回 / 4セット" },
            { name: "アダクション", target: "35kg × 15回 / 3セット" },
            { name: "自重スクワット", target: "自重 × 20回 / 3セット" },
            { name: "カーフレイズ", target: "自重 × 20回 / 3セット" },
            { name: "アブベンチ", target: "自重 × 15～20回 / 3セット" },
            { name: "有酸素（トレッドミル/バイク）", target: "歩行6km/h・軽いジョグ8km/h（目安20分）" }
        ]
    };

    let currentGroup = "A";
    let completedIndexes = [];

    const groupBadge = document.getElementById("groupBadge");
    const workoutList = document.getElementById("workoutList");
    const finishBtn = document.getElementById("finishBtn");

    function initApp() {
        const savedGroup = localStorage.getItem("next_group");
        if (savedGroup === "A" || savedGroup === "B") {
            currentGroup = savedGroup;
        } else {
            currentGroup = "A";
        }
        
        completedIndexes = [];
        renderMenu();
    }

    function renderMenu() {
        // ヘッダーのバッジと色の更新 (A: ピンク / B: 青)
        groupBadge.textContent = `${currentGroup}グループ (${currentGroup === 'A' ? '上半身' : '下半身'})`;
        groupBadge.style.backgroundColor = currentGroup === 'A' ? '#ec4899' : '#3b82f6';

        workoutList.innerHTML = "";
        const currentMenu = menus[currentGroup];

        currentMenu.forEach((item, index) => {
            const li = document.createElement("li");
            li.className = "workout-item";
            
            if (completedIndexes.includes(index)) {
                li.classList.add("completed");
            }

            li.innerHTML = `
                <div class="workout-info">
                    <span class="workout-name">${item.name}</span>
                    <span class="workout-target">${item.target}</span>
                </div>
                <div class="status-icon"></div>
            `;

            li.addEventListener("click", () => toggleComplete(index));
            workoutList.appendChild(li);
        });
    }

    function toggleComplete(index) {
        const itemIdx = completedIndexes.indexOf(index);
        if (itemIdx > -1) {
            completedIndexes.splice(itemIdx, 1);
        } else {
            completedIndexes.push(index);
        }
        renderMenu();
    }

    finishBtn.addEventListener("click", () => {
        const nextGroup = currentGroup === "A" ? "B" : "A";
        const nextGroupName = nextGroup === "A" ? "Aグループ (上半身)" : "Bグループ (下半身)";
        
        localStorage.setItem("next_group", nextGroup);
        
        currentGroup = nextGroup;
        completedIndexes = [];
        renderMenu();
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
        alert(`お疲れ様でした！次回は ${nextGroupName} です。`);
    });

    initApp();
</script>

</body>
</html>
